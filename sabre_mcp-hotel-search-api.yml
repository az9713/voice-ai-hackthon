openapi: 3.0.3
info:
  title: Hotel Search API - Beta API
  description: This API lets you perform a broad availability search for hotel
    properties within a specific geographical area and defined radius.
  version: '1.0'
x-lingo-api-type: rpc
servers:
  - url: https://api.{environment}.platform.sabre.com{basePath}
    variables:
      environment:
        default: 'cert'
        enum:
          - cert # Public Certification Server
      basePath:
        default: '/v1/hotels'
security:
  - oauth2_authentication: []
tags:
  - name: Hotels
    description: Hotel web resource.
paths:
  /hotelSearch:
    post:
      operationId: hotelSearch
      summary: Get hotel availability.
      description: Creates a request for the lowest rates available for multiple hotel
        properties.
      tags:
        - Hotels
      parameters:
        - name: Application-ID
          in: header
          description: The customer application ID. It's recommended but not
            needed. If you don't already have one, contact your account
            manager.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HotelSearchRequest'
            examples:
              1. Search in Geographic Location:
                $ref: '#/components/examples/SearchHotelsInGeoLocation'
              2.  Search near an Address:
                $ref: '#/components/examples/SearchHotelsByAddress'
              3. Search near a Reference Point:
                $ref: '#/components/examples/SearchHotelsByReferencePoint'
      responses:
        '200':
          description: Hotel search response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HotelAvailabilityDocument'
              examples:
                Hotel Search Response:
                  $ref: '#/components/examples/HotelSearchResponse'

components:
  examples:
    SearchHotelsInGeoLocation:
      description: |
        #### Scenario
        In this example, we will request hotels based on the provided `latitude` and `longitude`.
        #### Instruction
        In addition to the `latitude` and `longitude` parameters, we also need to include the following information in our request:
        
        - search radius in miles
        - check-in and checkout dates
        - number of guests
      value:
        {
          "currencyCode": "USD",
          "radiusInMiles": 200,
          "checkInDate": "2025-10-21",
          "checkOutDate": "2025-10-23",
          "numberOfAdults": 2,
          "latitude": 35.04022,
          "longitude": -106.60919
        }
    SearchHotelsByAddress:
      description: |
        #### Scenario
        In this example, we will search for hotels by a specific address.
        #### Instruction
        Aside from the `address` object to search by, we need to add the following data to our request:
        
        - search radius in miles
        - check-in and checkout dates
        - number of guests
        
        To restrict the response to hotels in the US, we will also use the `restrictSearchToCountry` parameter.
      value:
        {
          "currencyCode": "USD",
          "radiusInMiles": 200,
          "restrictSearchToCountry": "US",
          "checkInDate": "2025-10-21",
          "checkOutDate": "2025-10-23",
          "numberOfAdults": 2,
          "address":
            {
              "street": "2440 Victory Park Ln",
              "city": "Dallas",
              "stateCode": "TX",
              "postalCode": "75219",
              "countryCode": "US"
            }
        }
    SearchHotelsByReferencePoint:
      description: |
        #### Scenario
        In this example, we will request hotels near a reference point: the DFW airport.
        #### Instruction
        In addition to the airport code within the `referencePoint` object, we need to provide the following details in our request:
        
        - search radius in miles
        - check-in and checkout dates
        - number of guests
      value:
        {
          "currencyCode": "USD",
          "radiusInMiles": 200,
          "checkInDate": "2025-10-21",
          "checkOutDate": "2025-10-23",
          "maxResults": 2,
          "referencePoint": { "type": "Airport", "value": "DFW" }
        }
