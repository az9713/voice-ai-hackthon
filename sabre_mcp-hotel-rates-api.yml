openapi: 3.0.3
info:
  title: Hotel Rates API - Beta API
  version: '1.0'
  description: The Hotel Rates API provides comprehensive rate and inventory details for a specific hotel property based on defined stay parameters.
x-lingo-api-type: rpc
servers:
  - url: https://api.{environment}.platform.sabre.com{basePath}
    variables:
      environment:
        default: 'cert'
        enum:
          - cert # Public Certification Server
      basePath:
        default: '/v1/hotels'
security:
  - oauth2_authentication: []
tags:
  - name: Hotels
    description: Hotels web resource.
paths:
  /getHotelRates:
    post:
      operationId: getHotelRates
      description: Creates a request for rates available for chosen hotel.
      tags:
        - Hotels
      parameters:
        - name: Application-ID
          in: header
          description: Specifies the customer application ID. It is recommended but not needed. If you don't already have one, work with your account
            manager to generate one.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HotelRatesRequest'
            examples:
              1. Get rates for a specific hotel, room, and bed type:
                $ref: '#/components/examples/HotelRatesRequest'
      responses:
        '200':
          description: Request successfully processed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HotelRatesResponse'
              examples:
                1. Get rates for a specific hotel, room, and bed type:
                  $ref: '#/components/examples/HotelRatesResponse'
components:
  examples:
