          "currencyCode": "USD",
          "checkInDate": "2025-10-21",
          "checkOutDate": "2025-10-23",
          "hotelCode": "123456789",
          "roomType": "Suite",
          "bedType": "Double",
          "numberOfAdults": 2,
          "numberOfChildren": 0
        }
